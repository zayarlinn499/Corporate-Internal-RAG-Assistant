<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance RAG Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">📈</span>
                <h2>Finance RAG</h2>
            </div>
            <div class="sidebar-nav">
                <button class="nav-btn active" id="new-chat-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    New Chat
                </button>
                
                <div class="chat-history">
                    <h3>Recent Chats</h3>
                    <ul id="chat-list" class="chat-list">
                        <!-- Chat history items injected here -->
                    </ul>
                </div>
            </div>
            
            <div class="doc-manager">
                <h3>Documents</h3>
                <div class="upload-section">
                    <input type="file" id="doc-upload" accept=".txt,.pdf,.xlsx,.xls" hidden>
                    <button class="nav-btn upload-btn" id="upload-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                        Upload File
                    </button>
                    <div id="upload-status" class="status-text"></div>
                </div>
                <ul id="doc-list" class="doc-list">
                    <!-- Documents injected here -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <p>AI Powered Assistant</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <h1>Finance Data Assistant</h1>
                <p>Ask me anything about the company dataset</p>
            </header>

            <div class="chat-window" id="chat-window">
                <!-- Chat messages will be injected here -->
                <div class="message assistant-message intro">
                    <div class="avatar">AI</div>
                    <div class="content">Hello! I'm your financial data assistant. You can ask me to analyze metrics, count companies, or retrieve specific information about industries.</div>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
                        <button type="submit" id="send-btn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <!-- Markdown parser (marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
